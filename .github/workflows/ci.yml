name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & vet (linux/amd64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install Linux GUI deps + 7z CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            xorg-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxcursor-dev \
            p7zip-full

      - name: Verify 7z is reachable
        run: |
          which 7z 7za
          7z | head -3

      - name: go vet (non-GUI packages)
        run: go vet ./internal/archiver/... ./internal/i18n/... ./internal/assets/...

      - name: go vet (GUI packages — needs CGO + GL headers)
        run: go vet ./internal/ui/... ./cmd/openbox/...

      - name: go test
        run: go test ./internal/... -v -count=1

      - name: go build (Linux smoke)
        env:
          CGO_ENABLED: "1"
        run: |
          go build -o /tmp/openbox ./cmd/openbox
          ls -lh /tmp/openbox
