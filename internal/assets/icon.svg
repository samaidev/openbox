<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="boxFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="boxFlap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (modern app icon) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="0" y="0" width="512" height="256" rx="112" ry="112" fill="#ffffff" opacity="0.08"/>

  <!-- Box flaps (open lid, folded outward) -->
  <polygon points="96,200 200,160 256,184 312,160 416,200 312,232 256,216 200,232"
           fill="url(#boxFlap)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round" opacity="0.95"/>

  <!-- Box body (front face) -->
  <polygon points="112,232 256,216 400,232 376,424 256,448 136,424"
           fill="url(#boxFront)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>

  <!-- Box side shadow (left) -->
  <polygon points="112,232 256,216 256,448 136,424"
           fill="#0c4a6e" opacity="0.18"/>

  <!-- Upward arrow inside the box (extract/open semantic) -->
  <polygon points="256,250 311,310 280,310 280,400 232,400 232,310 201,310"
           fill="url(#arrow)" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
</svg>
